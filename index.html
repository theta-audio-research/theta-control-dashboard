<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>THETA Today — Control Dashboard</title>
  <style>
    :root {
      --bg: #06080C;
      --surface: #0D121B;
      --surface-soft: #121A26;
      --surface-quiet: #091019;
      --border: #344156;
      --border-soft: #253244;
      --text-main: #F2F2EA;
      --text-secondary: #C3CBD7;
      --text-muted: #8792A2;
      --gold: #C8A86B;
      --blue-today: #73B7E6;
      --green-active: #79D28A;
      --amber-decision: #E7B75F;
      --red-blocked: #E26D6D;
      --gray-parked: #6F7886;
      --focus-ring: #F2CF7A;
      --shadow: rgba(0, 0, 0, 0.34);

      --font-xs: 0.82rem;
      --font-sm: 0.95rem;
      --font-md: 1.08rem;
      --font-lg: 1.35rem;
      --font-xl: 1.75rem;

      --space-1: 6px;
      --space-2: 10px;
      --space-3: 14px;
      --space-4: 18px;
      --space-5: 24px;
      --space-6: 32px;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text-main);
      font-family: "Atkinson Hyperlegible", "Lexend", Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.55;
    }

    button, input, select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    :focus-visible {
      outline: 3px solid var(--focus-ring);
      outline-offset: 3px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      justify-content: space-between;
      gap: var(--space-4);
      align-items: center;
      padding: var(--space-4) var(--space-5);
      background: rgba(6, 8, 12, 0.97);
      border-bottom: 1px solid var(--border);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    .theta-mark {
      width: 46px;
      height: 46px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(200,168,107,0.6);
      border-radius: 50%;
      color: var(--gold);
      font-size: 1.35rem;
      font-weight: 800;
      background: rgba(200,168,107,0.07);
    }

    h1, h2, h3, p { margin-top: 0; }

    h1 {
      margin-bottom: 0;
      color: var(--text-main);
      font-size: var(--font-xl);
      letter-spacing: 0.02em;
      line-height: 1.1;
    }

    .topbar p {
      margin: 4px 0 0;
      color: var(--text-secondary);
      font-size: var(--font-sm);
    }

    .clock {
      text-align: right;
      color: var(--text-secondary);
      font-size: var(--font-sm);
      min-width: 215px;
    }

    .nav-tabs {
      position: sticky;
      top: 83px;
      z-index: 19;
      display: flex;
      gap: var(--space-2);
      padding: var(--space-3) var(--space-5);
      overflow-x: auto;
      background: rgba(6, 8, 12, 0.95);
      border-bottom: 1px solid var(--border-soft);
    }

    .tab {
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--text-secondary);
      background: var(--surface-quiet);
      white-space: nowrap;
    }

    .tab.is-active {
      border-color: var(--gold);
      color: var(--text-main);
      background: rgba(200,168,107,0.11);
    }

    main {
      max-width: 1480px;
      margin: 0 auto;
      padding: var(--space-5);
    }

    .view[hidden] {
      display: none !important;
    }

    .section {
      padding: var(--space-5);
      margin-bottom: var(--space-5);
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--surface);
      box-shadow: 0 24px 80px var(--shadow);
    }

    .section-title {
      margin-bottom: var(--space-4);
      color: var(--gold);
      font-size: var(--font-md);
      letter-spacing: 0.03em;
    }

    .today-grid {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: var(--space-5);
      align-items: start;
    }

    .priority-list,
    .mini-grid,
    .detail-grid {
      display: grid;
      gap: var(--space-4);
    }

    .priority-card,
    .mini-card,
    .detail-box,
    .ritual-box {
      border: 1px solid var(--border);
      border-radius: 22px;
      background: var(--surface-soft);
      padding: var(--space-5);
    }

    .priority-card {
      min-height: 210px;
      border-left: 7px solid var(--blue-today);
    }

    .priority-card__top,
    .mini-card__top,
    .detail-panel__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      margin-bottom: var(--space-4);
    }

    .rank-name {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      min-width: 0;
    }

    .priority-card__rank {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(115,183,230,0.14);
      color: var(--blue-today);
      border: 1px solid rgba(115,183,230,0.5);
      font-weight: 800;
    }

    .priority-card__title,
    .mini-card h3,
    .detail-title {
      margin: 0;
      color: var(--text-main);
      font-size: var(--font-lg);
      line-height: 1.2;
      letter-spacing: 0.01em;
    }

    .field {
      margin-bottom: var(--space-3);
    }

    .field__label {
      color: var(--gold);
      font-size: var(--font-xs);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 3px;
    }

    .field__value {
      color: var(--text-main);
      font-size: var(--font-md);
    }

    .field--strong .field__value {
      color: var(--text-main);
      font-weight: 750;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 10px 16px;
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--text-main);
      background: #08101A;
    }

    .button:hover {
      border-color: var(--gold);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 11px;
      border-radius: 999px;
      border: 1px solid var(--border);
      font-size: var(--font-xs);
      font-weight: 760;
      white-space: nowrap;
    }

    .badge--today { color: var(--blue-today); border-color: rgba(115,183,230,0.7); }
    .badge--active { color: var(--green-active); border-color: rgba(121,210,138,0.7); }
    .badge--blocked { color: var(--red-blocked); border-color: rgba(226,109,109,0.75); }
    .badge--decision { color: var(--amber-decision); border-color: rgba(231,183,95,0.75); }
    .badge--parked,
    .badge--historical { color: var(--gray-parked); border-color: rgba(111,120,134,0.75); }
    .badge--high { color: var(--green-active); border-color: rgba(121,210,138,0.6); }
    .badge--medium { color: var(--amber-decision); border-color: rgba(231,183,95,0.6); }
    .badge--low { color: var(--red-blocked); border-color: rgba(226,109,109,0.6); }

    .mini-card {
      border-left: 6px solid var(--border);
    }

    .mini-card--active { border-left-color: var(--green-active); }
    .mini-card--blocked { border-left-color: var(--red-blocked); }
    .mini-card--decision { border-left-color: var(--amber-decision); }
    .mini-card--parked,
    .mini-card--historical { border-left-color: var(--gray-parked); }

    .mini-card p {
      margin-bottom: var(--space-4);
      color: var(--text-secondary);
      font-size: var(--font-md);
    }

    .side-stack {
      display: grid;
      gap: var(--space-5);
    }

    .ignore-chips {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
    }

    .ignore-chip {
      padding: 10px 13px;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      background: #081019;
      font-weight: 700;
    }

    .active-controls,
    .tracker-controls,
    .detail-controls {
      display: flex;
      gap: var(--space-3);
      flex-wrap: wrap;
      margin-bottom: var(--space-4);
    }

    .search,
    .select {
      min-height: 48px;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--text-main);
      background: #081019;
    }

    .search {
      min-width: 280px;
      flex: 1;
    }

    .active-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: var(--space-4);
    }

    .detail-panel {
      display: grid;
      gap: var(--space-5);
    }

    .detail-hero {
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--surface-soft);
      padding: var(--space-5);
    }

    .detail-hero p {
      color: var(--text-secondary);
      font-size: var(--font-md);
      max-width: 900px;
      margin-bottom: 0;
    }

    .detail-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .detail-box h3,
    .ritual-box h3 {
      color: var(--gold);
      font-size: var(--font-md);
      margin-bottom: var(--space-2);
    }

    .detail-box p,
    .ritual-box p,
    .ritual-box pre {
      color: var(--text-main);
      font-size: var(--font-md);
      margin-bottom: 0;
    }

    .detail-box--blocked { border-left: 7px solid var(--red-blocked); }
    .detail-box--next { border-left: 7px solid var(--blue-today); }
    .detail-box--first { border-left: 7px solid var(--green-active); }
    .detail-box--not { border-left: 7px solid var(--gray-parked); }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: #081019;
    }

    table {
      width: 100%;
      min-width: 1220px;
      border-collapse: collapse;
    }

    th, td {
      padding: 14px;
      text-align: left;
      border-bottom: 1px solid var(--border-soft);
      vertical-align: top;
    }

    th {
      color: var(--gold);
      background: #09111C;
      font-size: var(--font-xs);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    td {
      color: var(--text-secondary);
      font-size: var(--font-sm);
    }

    td:first-child {
      color: var(--text-main);
      font-weight: 780;
    }

    tr {
      cursor: pointer;
    }

    tr:hover td {
      background: rgba(200,168,107,0.045);
    }

    .ritual-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--space-5);
    }

    pre {
      white-space: pre-wrap;
      font-family: inherit;
      line-height: 1.55;
    }


    .sort-button {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      width: 100%;
      min-height: 36px;
      padding: 0;
      border: 0;
      border-radius: 8px;
      color: var(--gold);
      background: transparent;
      text-align: left;
      font: inherit;
      font-size: var(--font-xs);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
    }

    .sort-button:hover {
      color: var(--text-main);
    }

    .sort-indicator {
      display: inline-flex;
      min-width: 1.2em;
      color: var(--text-secondary);
      font-size: 0.95em;
    }

    th[aria-sort="ascending"] .sort-indicator,
    th[aria-sort="descending"] .sort-indicator {
      color: var(--gold);
    }


    .readiness-wrap {
      display: grid;
      gap: 7px;
      min-width: 170px;
    }

    .readiness-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      color: var(--text-main);
      font-size: var(--font-sm);
      font-weight: 780;
    }

    .readiness-label {
      color: var(--text-secondary);
      font-size: var(--font-xs);
      font-weight: 700;
    }

    .readiness-bar {
      width: 100%;
      height: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #070D15;
    }

    .readiness-fill {
      height: 100%;
      border-radius: 999px;
      background: var(--red-blocked);
    }

    .readiness-fill--early { background: var(--red-blocked); }
    .readiness-fill--prototype { background: var(--amber-decision); }
    .readiness-fill--active { background: var(--blue-today); }
    .readiness-fill--beta { background: var(--green-active); }
    .readiness-fill--ship { background: var(--gold); }
    .readiness-fill--na { background: var(--gray-parked); }

    .readiness-scale {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-top: 10px;
      color: var(--text-muted);
      font-size: var(--font-xs);
    }

    .readiness-scale span {
      padding: 8px 10px;
      border: 1px solid var(--border-soft);
      border-radius: 12px;
      background: #081019;
      text-align: center;
    }


    .sync-card {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: var(--space-4);
      align-items: center;
      margin-bottom: var(--space-5);
      padding: var(--space-4) var(--space-5);
      border: 1px solid var(--border);
      border-left: 7px solid var(--gold);
      border-radius: 22px;
      background: var(--surface-soft);
    }

    .sync-card__label {
      color: var(--gold);
      font-size: var(--font-xs);
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .sync-card__time {
      color: var(--text-main);
      font-size: var(--font-lg);
      font-weight: 820;
      line-height: 1.2;
    }

    .sync-card__detail {
      color: var(--text-secondary);
      font-size: var(--font-sm);
      margin-top: 4px;
    }

    .sync-card__badge {
      justify-self: end;
      min-width: 120px;
      text-align: center;
    }

    @media (max-width: 720px) {
      .sync-card {
        grid-template-columns: 1fr;
      }

      .sync-card__badge {
        justify-self: start;
      }
    }


    .ticket-panel {
      margin-top: var(--space-5);
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--surface);
      padding: var(--space-5);
    }
    .ticket-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
      margin-bottom: var(--space-4);
    }
    .ticket-header h3 {
      margin: 0;
      color: var(--gold);
      font-size: var(--font-md);
    }
    .ticket-settings {
      display: grid;
      grid-template-columns: minmax(240px, 1fr) minmax(240px, 1fr);
      gap: var(--space-3);
      margin-bottom: var(--space-4);
      padding: var(--space-4);
      border: 1px solid var(--border-soft);
      border-radius: 18px;
      background: #081019;
    }
    .ticket-list {
      display: grid;
      gap: var(--space-3);
    }
    .ticket-card {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: var(--space-3);
      padding: var(--space-4);
      border: 1px solid var(--border);
      border-left: 7px solid var(--blue-today);
      border-radius: 18px;
      background: var(--surface-soft);
    }
    .ticket-card[data-status="passed"] { border-left-color: var(--green-active); }
    .ticket-card[data-status="failed"] { border-left-color: var(--red-blocked); }
    .ticket-card[data-status="blocked"] { border-left-color: var(--amber-decision); }
    .ticket-checkbox {
      width: 24px;
      height: 24px;
      margin-top: 3px;
      accent-color: var(--green-active);
    }
    .ticket-question {
      color: var(--text-main);
      font-size: var(--font-md);
      font-weight: 760;
      margin-bottom: var(--space-3);
    }
    .ticket-meta {
      display: grid;
      grid-template-columns: repeat(3, minmax(150px, 1fr));
      gap: var(--space-2);
      margin-bottom: var(--space-3);
    }
    .ticket-notes {
      width: 100%;
      min-height: 78px;
      resize: vertical;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--text-main);
      background: #070D15;
      font: inherit;
      font-size: var(--font-sm);
      line-height: 1.5;
    }
    .ticket-actions {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      margin-top: var(--space-3);
    }
    .ticket-empty {
      color: var(--text-secondary);
      padding: var(--space-4);
      border: 1px dashed var(--border);
      border-radius: 18px;
    }
    .return-packet-box {
      margin-top: var(--space-4);
      white-space: pre-wrap;
      max-height: 340px;
      overflow: auto;
      padding: var(--space-4);
      border: 1px solid var(--border);
      border-radius: 18px;
      color: var(--text-main);
      background: #070D15;
      font-family: inherit;
      font-size: var(--font-sm);
    }
    @media (max-width: 900px) {
      .ticket-settings, .ticket-meta { grid-template-columns: 1fr; }
    }

    .footer-note {
      color: var(--text-muted);
      font-size: var(--font-sm);
      margin-top: var(--space-4);
    }

    .load-error {
      border: 1px solid rgba(226,109,109,0.8);
      border-left: 7px solid var(--red-blocked);
      border-radius: 20px;
      background: rgba(226,109,109,0.08);
      padding: var(--space-5);
      color: var(--text-main);
      font-size: var(--font-md);
    }

    @media (max-width: 1100px) {
      .today-grid,
      .detail-grid,
      .ritual-grid {
        grid-template-columns: 1fr;
      }

      .topbar {
        align-items: flex-start;
      }
    }

    @media (max-width: 720px) {
      .topbar {
        flex-direction: column;
        position: static;
      }

      .clock {
        text-align: left;
      }

      .nav-tabs {
        top: 0;
      }

      main {
        padding: var(--space-3);
      }

      .section,
      .priority-card,
      .mini-card,
      .detail-box,
      .detail-hero,
      .ritual-box {
        padding: var(--space-4);
      }

      .priority-card__top,
      .mini-card__top,
      .detail-panel__header {
        align-items: flex-start;
        flex-direction: column;
      }

      .priority-card__title,
      .mini-card h3,
      .detail-title {
        font-size: 1.25rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation: none !important;
        transition: none !important;
        scroll-behavior: auto !important;
      }
    }

    /* v3.3 Visual Comfort + Ticket Category Grouping */
    :root {
      --font-xs: 0.72rem;
      --font-sm: 0.80rem;
      --font-md: 0.88rem;
      --font-lg: 1.00rem;
      --font-xl: 1.16rem;
      --font-xxl: 1.34rem;
      --reading-line-height: 1.48;
    }

    body {
      font-size: 14px;
      line-height: var(--reading-line-height);
    }

    h1 {
      font-size: 1.38rem;
      letter-spacing: 0.06em;
    }

    h2 {
      font-size: 1.08rem;
    }

    h3 {
      font-size: 0.98rem;
    }

    .card,
    .project-card,
    .detail-card,
    .ticket-panel {
      line-height: var(--reading-line-height);
    }

    .badge,
    .button,
    .select,
    .search {
      font-size: var(--font-sm);
    }

    .ticket-panel {
      padding: var(--space-4);
    }

    .ticket-header h3 {
      font-size: 0.98rem;
      letter-spacing: 0.08em;
    }

    .ticket-list {
      display: grid;
      gap: var(--space-4);
    }

    .ticket-category-group {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.025);
      padding: var(--space-4);
      display: grid;
      gap: var(--space-3);
    }

    .ticket-category-head {
      display: flex;
      justify-content: space-between;
      gap: var(--space-3);
      align-items: flex-start;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding-bottom: var(--space-3);
    }

    .ticket-category-title {
      font-size: 0.86rem;
      line-height: 1.25;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--text-strong);
      margin: 0;
    }

    .ticket-category-description {
      margin-top: 0.25rem;
      color: var(--text-muted);
      font-size: var(--font-sm);
      line-height: 1.45;
      max-width: 70ch;
    }

    .ticket-category-count {
      white-space: nowrap;
      opacity: 0.88;
    }

    .ticket-card {
      grid-template-columns: 24px 1fr;
      gap: var(--space-3);
      padding: var(--space-3);
      border-radius: 14px;
    }

    .ticket-question {
      font-size: 0.88rem;
      line-height: 1.46;
      letter-spacing: 0.005em;
    }

    .ticket-submeta {
      margin-top: 0.28rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      color: var(--text-muted);
      font-size: var(--font-xs);
    }

    .ticket-detail-grid {
      display: grid;
      gap: 0.35rem;
      margin-top: 0.55rem;
      color: var(--text-muted);
      font-size: var(--font-sm);
      line-height: 1.42;
    }

    .ticket-detail-label {
      color: var(--text-soft);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.68rem;
      margin-right: 0.35rem;
    }

    .ticket-meta {
      margin-top: 0.65rem;
    }

    .ticket-notes {
      font-size: 0.82rem;
      line-height: 1.45;
      min-height: 84px;
    }

    .return-packet-box {
      font-size: 0.80rem;
      line-height: 1.45;
    }
    /* end v3.3 Visual Comfort + Ticket Category Grouping */


    /* v3.4 Collapsible Ticket Category Folders */
    .ticket-category-folder {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.025);
      overflow: hidden;
    }

    .ticket-category-folder + .ticket-category-folder {
      margin-top: var(--space-3);
    }

    .ticket-category-folder summary {
      list-style: none;
      cursor: pointer;
      user-select: none;
    }

    .ticket-category-folder summary::-webkit-details-marker {
      display: none;
    }

    .ticket-category-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: var(--space-3);
      align-items: center;
      padding: var(--space-4);
      border-bottom: 1px solid transparent;
      transition: background 140ms ease, border-color 140ms ease;
    }

    .ticket-category-folder[open] .ticket-category-head {
      border-bottom-color: rgba(255,255,255,0.08);
      background: rgba(255, 255, 255, 0.025);
    }

    .ticket-category-main {
      display: flex;
      align-items: flex-start;
      gap: var(--space-3);
      min-width: 0;
    }

    .ticket-folder-caret {
      width: 1.1rem;
      height: 1.1rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      display: inline-grid;
      place-items: center;
      color: var(--text-muted);
      font-size: 0.72rem;
      line-height: 1;
      margin-top: 0.05rem;
      flex: 0 0 auto;
    }

    .ticket-folder-caret::before {
      content: "›";
      transform: translateX(0.02rem);
      transition: transform 140ms ease;
    }

    .ticket-category-folder[open] .ticket-folder-caret::before {
      transform: rotate(90deg);
    }

    .ticket-category-body {
      padding: var(--space-4);
      display: grid;
      gap: var(--space-3);
    }

    .ticket-category-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 5.8rem;
    }
    /* end v3.4 Collapsible Ticket Category Folders */


    /* v3.5 Product Detail Sync Timestamps */
    .detail-sync-panel {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.026);
      padding: var(--space-4);
      margin-top: var(--space-4);
      display: grid;
      gap: var(--space-3);
    }

    .detail-sync-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      border-bottom: 1px solid rgba(255,255,255,0.075);
      padding-bottom: var(--space-3);
    }

    .detail-sync-title {
      margin: 0;
      font-size: 0.82rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-strong);
    }

    .sync-freshness {
      white-space: nowrap;
    }

    .sync-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--space-3);
    }

    .sync-row {
      min-width: 0;
      border: 1px solid rgba(255,255,255,0.065);
      border-radius: 13px;
      padding: 0.7rem 0.75rem;
      background: rgba(0,0,0,0.16);
    }

    .sync-label {
      display: block;
      color: var(--text-muted);
      font-size: 0.68rem;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      margin-bottom: 0.25rem;
    }

    .sync-value {
      display: block;
      color: var(--text-strong);
      font-size: 0.82rem;
      line-height: 1.38;
      overflow-wrap: anywhere;
    }

    .sync-value--mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 0.76rem;
      color: var(--text-soft);
    }

    .sync-empty {
      color: var(--text-muted);
      font-style: italic;
    }

    @media (max-width: 880px) {
      .sync-grid {
        grid-template-columns: 1fr;
      }
    }
    /* end v3.5 Product Detail Sync Timestamps */


    /* v3.8 Tester Name Dropdown */
    .tester-select-disabled {
      opacity: 0.58;
      cursor: not-allowed;
      filter: grayscale(0.15);
    }

    .tester-select-disabled[disabled] {
      color: var(--text-muted);
      background: rgba(255, 255, 255, 0.035);
      border-color: rgba(255, 255, 255, 0.08);
    }
    /* end v3.8 Tester Name Dropdown */

  </style>
</head>

<body>
  <header class="topbar">
    <div class="brand">
      <div class="theta-mark" aria-hidden="true">θ</div>
      <div>
        <h1>THETA Today</h1>
        <p>Focus Mode • Active delta only • Built for fewer decisions</p>
      </div>
    </div>
    <div class="clock" id="clock">Loading…</div>
  </header>

  <nav class="nav-tabs" aria-label="Dashboard views">
    <button class="tab is-active" data-view="todayView">Today</button>
    <button class="tab" data-view="activeView">Active</button>
    <button class="tab" data-view="detailView">Project Detail</button>
    <button class="tab" data-view="trackerView">Tracker</button>
    <button class="tab" data-view="ritualView">Ritual</button>
  </nav>

  <main>
    <section id="todayView" class="view view--today"></section>
    <section id="activeView" class="view" hidden></section>
    <section id="detailView" class="view" hidden></section>
    <section id="trackerView" class="view" hidden></section>
    <section id="ritualView" class="view" hidden></section>
  </main>

  <script>
    let dashboardData = null;
    let projects = [];
    let selectedProjectId = null;
    let activeSearch = "";
    let trackerSearch = "";
    let trackerStatus = "all";
    let trackerSortKey = "name";
    let trackerSortDir = "asc";

    const fallbackData = {
      schemaVersion: "2.0",
      lastUpdated: "fallback",
      dashboardMode: "focus",
      projects: []
    };

    const viewIds = ["todayView", "activeView", "detailView", "trackerView", "ritualView"];

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function statusLabel(status) {
      const map = {
        active: "Active",
        blocked: "Blocked",
        decision: "Decision",
        parked: "Parked",
        historical: "Historical"
      };
      return map[status] || "Unknown";
    }

    function badge(status) {
      return `<span class="badge badge--${escapeHtml(status)}">${escapeHtml(statusLabel(status))}</span>`;
    }

    function confidenceLabel(confidence) {
      const map = {
        high: "High",
        medium: "Medium",
        low: "Low",
        historical: "Historical"
      };
      return map[confidence] || "Unknown";
    }

    function confidenceBadge(confidence) {
      return `<span class="badge badge--${escapeHtml(confidence)}">${escapeHtml(confidenceLabel(confidence))}</span>`;
    }

    function sourceBadge(sourceCertainty) {
      return `<span class="badge badge--${escapeHtml(sourceCertainty)}">Evidence: ${escapeHtml(confidenceLabel(sourceCertainty))}</span>`;
    }

    function readinessClass(score) {
      const value = Number(score || 0);
      if (value >= 85) return "ship";
      if (value >= 65) return "beta";
      if (value >= 40) return "active";
      if (value >= 20) return "prototype";
      if (value > 0) return "early";
      return "na";
    }

    function readinessLabel(project) {
      if (project.readinessLabel) return project.readinessLabel;
      const score = Number(project.shipReadiness || 0);
      if (score >= 85) return "Shippable";
      if (score >= 65) return "Beta / close";
      if (score >= 40) return "Active build";
      if (score >= 20) return "Prototype";
      if (score > 0) return "Just begun";
      return "N/A";
    }

    function readinessBar(project) {
      const score = Math.max(0, Math.min(100, Number(project.shipReadiness || 0)));
      const cls = readinessClass(score);
      return `
        <div class="readiness-wrap" title="${escapeHtml(readinessLabel(project))}: ${score}%">
          <div class="readiness-top">
            <span>${score}%</span>
            <span class="readiness-label">${escapeHtml(readinessLabel(project))}</span>
          </div>
          <div class="readiness-bar" aria-label="Ship readiness ${score} percent">
            <div class="readiness-fill readiness-fill--${cls}" style="width:${score}%"></div>
          </div>
        </div>
      `;
    }

    function formatFormats(project) {
      const now = project.formatsNow?.length ? project.formatsNow.join(" / ") : "Unclear";
      const later = project.formatsLater?.length ? `Later: ${project.formatsLater.join(" / ")}` : "";
      return later ? `${now} • ${later}` : now;
    }

    function sortConfidence(a, b) {
      const rank = { high: 0, medium: 1, low: 2 };
      return (rank[a.confidence] ?? 3) - (rank[b.confidence] ?? 3);
    }

    function getTodayProjects() {
      return projects
        .filter(p => p.today)
        .sort((a, b) => (a.priorityRank ?? 99) - (b.priorityRank ?? 99))
        .slice(0, 3);
    }

    function getBlockedProjects() {
      return projects
        .filter(p => p.status === "blocked")
        .sort((a, b) => Number(b.today) - Number(a.today) || sortConfidence(a, b) || a.name.localeCompare(b.name))
        .slice(0, 3);
    }

    function getDecisionProjects() {
      return projects
        .filter(p => p.status === "decision")
        .sort((a, b) => Number(b.today) - Number(a.today) || sortConfidence(a, b) || a.name.localeCompare(b.name))
        .slice(0, 3);
    }

    function getIgnoredProjects() {
      return projects
        .filter(p => p.ignoreToday || p.status === "parked" || p.status === "historical")
        .sort((a, b) => a.name.localeCompare(b.name));
    }

    function priorityCard(project, index) {
      const blockerLine = project.status === "blocked" && project.blocker
        ? `<div class="field"><div class="field__label">Blocked</div><div class="field__value">${escapeHtml(project.blocker)}</div></div>`
        : "";

      return `
        <article class="priority-card" data-project-id="${escapeHtml(project.id)}">
          <div class="priority-card__top">
            <div class="rank-name">
              <div class="priority-card__rank">${index + 1}</div>
              <h3 class="priority-card__title">${escapeHtml(project.name)}</h3>
            </div>
            <span class="badge badge--today">Today</span>
          </div>

          <div class="field">
            <div class="field__label">Next</div>
            <div class="field__value">${escapeHtml(project.nextAction)}</div>
          </div>

          <div class="field field--strong">
            <div class="field__label">First action</div>
            <div class="field__value">${escapeHtml(project.firstAction)}</div>
          </div>

          ${blockerLine}

          <button class="button" data-action="open-detail" data-project-id="${escapeHtml(project.id)}">Open details</button>
        </article>
      `;
    }

    function miniCard(project, mode) {
      const body = mode === "blocked"
        ? `<strong>Need:</strong> ${escapeHtml(project.blocker || project.nextAction)}`
        : mode === "decision"
          ? `<strong>Decision:</strong> ${escapeHtml(project.decisionNeeded || project.nextAction)}`
          : `<strong>Next:</strong> ${escapeHtml(project.nextAction)}`;

      return `
        <article class="mini-card mini-card--${escapeHtml(project.status)}" data-project-id="${escapeHtml(project.id)}">
          <div class="mini-card__top">
            <h3>${escapeHtml(project.name)}</h3>
            ${badge(project.status)}
          </div>
          <p>${body}</p>
          <button class="button" data-action="open-detail" data-project-id="${escapeHtml(project.id)}">Open details</button>
        </article>
      `;
    }


    function getLastSyncInfo() {
      const sync = dashboardData?.lastControlRoomSync || dashboardData?.lastControlRoomSweep || {};
      const rawTime = sync.createdAt || sync.lastAppliedAt || dashboardData?.lastUpdated || "";
      let date = null;

      if (rawTime) {
        date = new Date(rawTime);
        if (Number.isNaN(date.getTime()) && /^\d{4}-\d{2}-\d{2}$/.test(rawTime)) {
          date = new Date(`${rawTime}T12:00:00`);
        }
      }

      const timeText = date && !Number.isNaN(date.getTime())
        ? date.toLocaleString(undefined, {
            weekday: "short",
            month: "short",
            day: "numeric",
            hour: "numeric",
            minute: "2-digit"
          })
        : "No sync recorded";

      const type = sync.type || "dashboard";
      const source = sync.source || "Control Room";
      const summary = sync.summary || sync.tomorrowFirstControlRoomAction || dashboardData?.todayMessage || "Waiting for first automation sync.";

      return { timeText, type, source, summary };
    }

    function renderLastSyncCard() {
      const info = getLastSyncInfo();
      return `
        <div class="sync-card" aria-label="Last Control Room sync">
          <div>
            <div class="sync-card__label">Last Control Room Sync</div>
            <div class="sync-card__time">${escapeHtml(info.timeText)}</div>
            <div class="sync-card__detail">${escapeHtml(info.summary)}</div>
          </div>
          <div class="sync-card__badge">
            <span class="badge badge--today">${escapeHtml(info.source)}</span>
          </div>
        </div>
      `;
    }

    function renderTodayView() {
      const today = getTodayProjects();
      const blocked = getBlockedProjects();
      const decisions = getDecisionProjects();
      const ignored = getIgnoredProjects();

      document.getElementById("todayView").innerHTML = `
        <div class="today-grid">
          <div>
            <section class="section">
              ${renderLastSyncCard()}
              <h2 class="section-title">Today — top 3 only</h2>
              <div class="priority-list">
                ${today.length ? today.map(priorityCard).join("") : `<div class="mini-card"><p>No priorities selected yet.</p></div>`}
              </div>
            </section>
          </div>

          <div class="side-stack">
            <section class="section">
              <h2 class="section-title">Blocked / waiting</h2>
              <div class="mini-grid">
                ${blocked.length ? blocked.map(p => miniCard(p, "blocked")).join("") : `<p>No blocked items marked.</p>`}
              </div>
            </section>

            <section class="section">
              <h2 class="section-title">Needs decision</h2>
              <div class="mini-grid">
                ${decisions.length ? decisions.map(p => miniCard(p, "decision")).join("") : `<p>No decisions marked.</p>`}
              </div>
            </section>

            <section class="section">
              <h2 class="section-title">Ignore today</h2>
              <div class="ignore-chips">
                ${ignored.length ? ignored.map(p => `<button class="ignore-chip" data-action="open-detail" data-project-id="${escapeHtml(p.id)}">${escapeHtml(p.name)}</button>`).join("") : `<span class="badge badge--parked">Nothing parked</span>`}
              </div>
              <p class="footer-note">These projects are still tracked, but they should not pull focus today.</p>
            </section>
          </div>
        </div>
      `;
    }

    function renderActiveView() {
      const visible = projects.filter(p => {
        const text = JSON.stringify(p).toLowerCase();
        const q = activeSearch.trim().toLowerCase();
        return !q || text.includes(q);
      });

      document.getElementById("activeView").innerHTML = `
        <section class="section">
          <h2 class="section-title">Active project landscape</h2>
          <div class="active-controls">
            <input class="search" id="activeSearch" type="search" placeholder="Search active projects…" value="${escapeHtml(activeSearch)}" />
          </div>
          <div class="active-grid">
            ${visible.map(p => miniCard(p, p.status)).join("")}
          </div>
        </section>
      `;

      document.getElementById("activeSearch").addEventListener("input", (event) => {
        activeSearch = event.target.value;
        renderActiveView();
      });
    }


    function getApiSettings() {
      return {
        api: localStorage.getItem("thetaControlRoomApi") || "https://theta-control-room-automation.steveneal.workers.dev",
        token: localStorage.getItem("thetaControlRoomToken") || ""
      };
    }

    function saveApiSettings() {
      const api = document.getElementById("ticketApiBase")?.value?.trim() || "";
      const token = document.getElementById("ticketApiToken")?.value?.trim() || "";
      if (api) localStorage.setItem("thetaControlRoomApi", api);
      if (token) localStorage.setItem("thetaControlRoomToken", token);
      alert("Control Room API settings saved locally in this browser.");
    }

    async function controlRoomPost(path, payload) {
      const settings = getApiSettings();
      if (!settings.token) throw new Error("CONTROL_ROOM_TOKEN is not configured in this browser.");
      const response = await fetch(`${settings.api}${path}`, {
        method: "POST",
        headers: {
          "Authorization": `Bearer ${settings.token}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      });
      const json = await response.json().catch(() => ({}));
      if (!response.ok || json.ok === false) throw new Error(json.error || `Request failed: ${response.status}`);
      return json;
    }

    function ticketStatusOptions(status) {
      return ["open", "passed", "failed", "blocked"]
        .map(value => `<option value="${value}" ${value === status ? "selected" : ""}>${value}</option>`)
        .join("");
    }

    const TICKET_CATEGORY_ORDER = [
      "INSTALL / HOST",
      "BASIC AUDIO / STABILITY",
      "SONIC CHARACTER",
      "MODULE BEHAVIOR",
      "EQ / OUTPUT SURGERY",
      "INTERFACE / UX",
      "PRESETS / STATE / AUTOMATION",
      "PERFORMANCE / REGRESSION",
      "ROADMAP / EVIDENCE",
      "UNCATEGORIZED"
    ];

    const TICKET_CATEGORY_DESCRIPTIONS = {
      "INSTALL / HOST": "Does it build, install, appear, instantiate, validate, and replace old versions?",
      "BASIC AUDIO / STABILITY": "Does audio pass, avoid silence/crackle/hum/level jumps, and survive normal use?",
      "SONIC CHARACTER": "Does the product sound like itself? Does it improve material in a level-matched test?",
      "MODULE BEHAVIOR": "Do individual modules, modes, macros, and edge cases behave as designed?",
      "EQ / OUTPUT SURGERY": "Do EQ, filters, dynamic curves, and output-shaping tools match what the UI shows and what the ear expects?",
      "INTERFACE / UX": "Can you see, read, click, understand, resize, and operate it without fighting the UI?",
      "PRESETS / STATE / AUTOMATION": "Do presets, session recall, bypass, automation, offline render, and state restoration work?",
      "PERFORMANCE / REGRESSION": "CPU, spikes, denormals, meters, graph redraws, oversampling, stability under stress.",
      "ROADMAP / EVIDENCE": "Reference recordings, tester feedback, hardware comparison notes, and return-to-chat evidence.",
      "UNCATEGORIZED": "Tickets that need a category assignment."
    };

    function ticketCategory(ticket) {
      return ticket.category || ticket.type || ticket.qaCategory || "UNCATEGORIZED";
    }

    function ticketCategorySort(category) {
      const idx = TICKET_CATEGORY_ORDER.indexOf(category);
      return idx === -1 ? TICKET_CATEGORY_ORDER.length : idx;
    }

    function groupTicketsByCategory(tickets) {
      const grouped = new Map();
      for (const ticket of tickets) {
        const category = ticketCategory(ticket);
        if (!grouped.has(category)) grouped.set(category, []);
        grouped.get(category).push(ticket);
      }

      return [...grouped.entries()]
        .sort(([a], [b]) => ticketCategorySort(a) - ticketCategorySort(b) || a.localeCompare(b));
    }

    function splitTickets(project) {
      const tickets = project.testTickets || [];
      return {
        open: tickets.filter(t => (t.status || "open") !== "passed"),
        completed: tickets.filter(t => (t.status || "open") === "passed")
      };
    }

    function ticketDetailLine(label, value) {
      if (!value) return "";
      return `<div><span class="ticket-detail-label">${escapeHtml(label)}</span>${escapeHtml(value)}</div>`;
    }

    function testerNameOptions(current) {
      const names = ["Steve Neal"];
      const selected = current || "Steve Neal";
      return names
        .map(name => `<option value="${escapeHtml(name)}" ${name === selected ? "selected" : ""}>${escapeHtml(name)}</option>`)
        .join("");
    }

    function ticketCard(project, ticket) {
      const status = ticket.status || "open";
      const checked = status === "passed" ? "checked" : "";
      const priority = ticket.priority || "";
      const layer = ticket.qaLayer || ticket.layer || "";
      const versionValue = ticket.versionTested || ticket.version || "";
      const submeta = [priority, layer, ticket.id].filter(Boolean).join(" · ");
      const details = [
        ticketDetailLine("Acceptance", ticket.acceptance),
        ticketDetailLine("Test material", ticket.testMaterial),
        ticketDetailLine("Notes target", ticket.notesTarget)
      ].join("");

      return `
        <article class="ticket-card" data-status="${escapeHtml(status)}" data-ticket-id="${escapeHtml(ticket.id)}">
          <input class="ticket-checkbox" type="checkbox" ${checked} data-action="ticket-toggle" data-project-id="${escapeHtml(project.id)}" data-ticket-id="${escapeHtml(ticket.id)}" aria-label="Mark ticket passed" />
          <div>
            <div class="ticket-question">${escapeHtml(ticket.question)}</div>
            ${submeta ? `<div class="ticket-submeta">${escapeHtml(submeta)}</div>` : ""}
            ${details ? `<div class="ticket-detail-grid">${details}</div>` : ""}
            <div class="ticket-meta">
              <select class="select" data-ticket-field="status" aria-label="Ticket status">${ticketStatusOptions(status)}</select>
              <select class="select tester-select-disabled" data-ticket-field="tester" aria-label="Tester name" disabled title="Tester selection is locked for now">
                ${testerNameOptions(ticket.tester)}
              </select>
              <input class="search" data-ticket-field="version" placeholder="Version tested" value="${escapeHtml(versionValue)}" />
            </div>
            <textarea class="ticket-notes" data-ticket-field="notes" placeholder="Tester notes, observations, failure details, or pass criteria...">${escapeHtml(ticket.notes || "")}</textarea>
            <div class="ticket-actions">
              <button class="button" data-action="ticket-save" data-project-id="${escapeHtml(project.id)}" data-ticket-id="${escapeHtml(ticket.id)}">Save ticket</button>
              <button class="button" data-action="ticket-complete" data-project-id="${escapeHtml(project.id)}" data-ticket-id="${escapeHtml(ticket.id)}">Mark passed</button>
            </div>
          </div>
        </article>
      `;
    }

    function ticketCategoryGroup(project, category, tickets, mode) {
      const description = TICKET_CATEGORY_DESCRIPTIONS[category] || TICKET_CATEGORY_DESCRIPTIONS.UNCATEGORIZED;
      const countLabel = `${tickets.length} ${tickets.length === 1 ? "ticket" : "tickets"}`;
      return `
        <details class="ticket-category-folder" data-ticket-category="${escapeHtml(category)}" data-ticket-mode="${escapeHtml(mode)}">
          <summary class="ticket-category-head">
            <div class="ticket-category-main">
              <span class="ticket-folder-caret" aria-hidden="true"></span>
              <div>
                <h4 class="ticket-category-title">${escapeHtml(category)}</h4>
                <div class="ticket-category-description">${escapeHtml(description)}</div>
              </div>
            </div>
            <span class="badge ticket-category-count">${escapeHtml(countLabel)}</span>
          </summary>
          <div class="ticket-category-body">
            ${tickets.map(t => ticketCard(project, t)).join("")}
          </div>
        </details>
      `;
    }

    function renderTicketGroups(project, tickets, mode) {
      const grouped = groupTicketsByCategory(tickets);
      if (!grouped.length) {
        return `<div class="ticket-empty">${mode === "completed" ? "No completed tickets yet." : "No open tickets."}</div>`;
      }
      return grouped.map(([category, items]) => ticketCategoryGroup(project, category, items, mode)).join("");
    }

    function renderTicketPanel(project) {
      const settings = getApiSettings();
      const groups = splitTickets(project);
      return `
        <section class="ticket-panel">
          <div class="ticket-header">
            <h3>Open Test Questions</h3>
            <span class="badge badge--today">${groups.open.length} open</span>
          </div>
          <div class="ticket-settings">
            <input class="search" id="ticketApiBase" value="${escapeHtml(settings.api)}" placeholder="Control Room API URL" />
            <input class="search" id="ticketApiToken" value="" type="password" placeholder="CONTROL_ROOM_TOKEN for this browser" />
            <button class="button" onclick="saveApiSettings()">Save API settings</button>
            <button class="button" data-action="return-packet" data-project-id="${escapeHtml(project.id)}">Generate return packet</button>
          </div>
          <div class="ticket-list">
            ${renderTicketGroups(project, groups.open, "open")}
          </div>
          <div class="ticket-header" style="margin-top: var(--space-5);">
            <h3>Completed / Archive</h3>
            <span class="badge badge--active">${groups.completed.length} passed</span>
          </div>
          <div class="ticket-list">
            ${renderTicketGroups(project, groups.completed, "completed")}
          </div>
          <div id="returnPacketBox" class="return-packet-box" hidden></div>
        </section>
      `;
    }


    function collectTicketPayload(button) {
      const card = button.closest(".ticket-card");
      const version = card.querySelector('[data-ticket-field="version"]')?.value || "";
      return {
        projectId: button.dataset.projectId,
        ticketId: button.dataset.ticketId,
        status: card.querySelector('[data-ticket-field="status"]')?.value || "open",
        tester: card.querySelector('[data-ticket-field="tester"]')?.value || "",
        version,
        versionTested: version,
        notes: card.querySelector('[data-ticket-field="notes"]')?.value || ""
      };
    }

    async function saveTicket(button, forceStatus = null) {
      const payload = collectTicketPayload(button);
      if (forceStatus) payload.status = forceStatus;
      try {
        await controlRoomPost(forceStatus === "passed" ? "/api/ticket/complete" : "/api/ticket", payload);
        alert("Ticket saved to Control Room.");
      } catch (error) {
        alert(`Ticket save failed: ${error.message}`);
      }
    }

    async function generateReturnPacket(projectId) {
      try {
        const json = await controlRoomPost("/api/return-packet", { projectId });
        const box = document.getElementById("returnPacketBox");
        if (box) {
          box.hidden = false;
          box.textContent = json.packet || JSON.stringify(json, null, 2);
        }
        if (json.packet && navigator.clipboard) await navigator.clipboard.writeText(json.packet).catch(() => {});
        alert("Return packet generated. If clipboard access is allowed, it was copied.");
      } catch (error) {
        alert(`Return packet failed: ${error.message}`);
      }
    }

    function formatControlRoomTimestamp(value) {
      if (!value) return { label: "Not reported yet", raw: "" };

      let raw = "";
      if (typeof value === "string") {
        raw = value;
      } else if (typeof value === "object") {
        raw = value.createdAt || value.timestamp || value.lastAppliedAt || value.date || "";
      }

      if (!raw) return { label: "Not reported yet", raw: "" };

      const date = new Date(raw);
      if (Number.isNaN(date.getTime())) {
        return { label: raw, raw };
      }

      const label = new Intl.DateTimeFormat("en-US", {
        timeZone: "America/Los_Angeles",
        month: "short",
        day: "2-digit",
        year: "numeric",
        hour: "numeric",
        minute: "2-digit",
        timeZoneName: "short"
      }).format(date);

      return { label, raw };
    }

    function syncFreshnessBadge(project) {
      const sync = project.lastControlRoomSync || {};
      const raw = sync.createdAt || project.lastUpdated || project.lastTouched || "";
      const date = raw ? new Date(raw) : null;

      if (!date || Number.isNaN(date.getTime())) {
        return `<span class="badge sync-freshness">No hook sync yet</span>`;
      }

      const ageHours = (Date.now() - date.getTime()) / 36e5;
      if (ageHours <= 24) return `<span class="badge badge--active sync-freshness">Fresh</span>`;
      if (ageHours <= 168) return `<span class="badge badge--today sync-freshness">Recent</span>`;
      return `<span class="badge badge--blocked sync-freshness">Stale</span>`;
    }

    function syncRow(label, value, mono = false, title = "") {
      const safeValue = value ? escapeHtml(value) : `<span class="sync-empty">Not reported yet</span>`;
      const titleAttr = title ? ` title="${escapeHtml(title)}"` : "";
      return `
        <div class="sync-row"${titleAttr}>
          <span class="sync-label">${escapeHtml(label)}</span>
          <span class="sync-value ${mono ? "sync-value--mono" : ""}">${safeValue}</span>
        </div>
      `;
    }

    function renderProjectSyncPanel(project) {
      const projectSync = project.lastControlRoomSync || {};
      const rootSync = dashboardData?.lastControlRoomSync || dashboardData?.lastControlRoomSweep || {};

      const projectTime = formatControlRoomTimestamp(
        projectSync.createdAt ? projectSync : (project.lastUpdated || project.lastTouched || "")
      );
      const rootTime = formatControlRoomTimestamp(rootSync);
      const localStamp = [
        projectSync.localDate || "",
        projectSync.localHour !== undefined && projectSync.localHour !== null ? `${String(projectSync.localHour).padStart(2, "0")}:00` : "",
        projectSync.timezone || rootSync.timezone || ""
      ].filter(Boolean).join(" ");

      const sourceArtifact = project.sourceArtifact || project.source_artifact || "";
      const buildArtifact = project.buildArtifact || project.build_artifact || project.artifact || "";
      const lastStatus = project.lastDeltaStatus || project.summary || project.lastKnownStatus || "";
      const syncSummary = projectSync.summary || rootSync.summary || "";

      return `
        <section class="detail-sync-panel">
          <div class="detail-sync-head">
            <h3 class="detail-sync-title">Control Room Sync</h3>
            ${syncFreshnessBadge(project)}
          </div>
          <div class="sync-grid">
            ${syncRow("Last project update", projectTime.label, false, projectTime.raw)}
            ${syncRow("Dashboard/root sync", rootTime.label, false, rootTime.raw)}
            ${syncRow("Project local stamp", localStamp)}
            ${syncRow("Latest version", project.currentVersion || project.latestVersion || project.lastBuild || "")}
            ${syncRow("Last delta status", lastStatus)}
            ${syncRow("Sync summary", syncSummary)}
            ${syncRow("Source artifact", sourceArtifact, true)}
            ${syncRow("Build artifact", buildArtifact, true)}
          </div>
        </section>
      `;
    }


    function renderDetailView(project = null) {
      const selected = project || projects.find(p => p.id === selectedProjectId) || getTodayProjects()[0] || projects[0];

      if (!selected) {
        document.getElementById("detailView").innerHTML = `<div class="load-error">No project data loaded.</div>`;
        return;
      }

      selectedProjectId = selected.id;

      const options = projects
        .slice()
        .sort((a, b) => a.name.localeCompare(b.name))
        .map(p => `<option value="${escapeHtml(p.id)}" ${p.id === selected.id ? "selected" : ""}>${escapeHtml(p.name)}</option>`)
        .join("");

      document.getElementById("detailView").innerHTML = `
        <section class="section detail-panel">
          <div class="detail-panel__header">
            <div class="detail-controls">
              <select class="select" id="projectSelect" aria-label="Choose project">${options}</select>
            </div>
            <div class="tag-row">
              ${badge(selected.status)}
              <span class="badge badge--${escapeHtml(readinessClass(selected.shipReadiness))}">Ship: ${escapeHtml(readinessLabel(selected))}</span>
              ${sourceBadge(selected.sourceCertainty || selected.sourceConfidence || selected.confidence)}
            </div>
          </div>

          <div class="detail-hero">
            <h2 class="detail-title">${escapeHtml(selected.name)}</h2>
            <p>${escapeHtml(selected.description)}</p>
          </div>

          ${renderProjectSyncPanel(selected)}

          <div class="detail-grid">
            <div class="detail-box">
              <h3>Latest version</h3>
              <p>${escapeHtml(selected.latestVersion)}</p>
            </div>

            <div class="detail-box">
              <h3>Formats</h3>
              <p>${escapeHtml(formatFormats(selected))}</p>
            </div>

            <div class="detail-box">
              <h3>Stage</h3>
              <p>${escapeHtml(selected.stage || "Unclassified")}</p>
            </div>

            <div class="detail-box">
              <h3>Ship readiness</h3>
              ${readinessBar(selected)}
              <div class="readiness-scale">
                <span>Just begun</span>
                <span>Prototype</span>
                <span>Active build</span>
                <span>Beta</span>
                <span>Shippable</span>
              </div>
            </div>

            <div class="detail-box detail-box--blocked">
              <h3>Current blocker</h3>
              <p>${escapeHtml(selected.blocker || selected.decisionNeeded || "No current blocker marked.")}</p>
            </div>

            <div class="detail-box detail-box--next">
              <h3>Next action</h3>
              <p>${escapeHtml(selected.nextAction)}</p>
            </div>

            <div class="detail-box detail-box--first">
              <h3>Tomorrow’s first action</h3>
              <p>${escapeHtml(selected.tomorrowFirstAction || selected.firstAction)}</p>
            </div>

            <div class="detail-box detail-box--not">
              <h3>Not today</h3>
              <p>${escapeHtml(selected.notToday || "No restriction marked.")}</p>
            </div>

            <div class="detail-box">
              <h3>Last known status</h3>
              <p>${escapeHtml(selected.lastKnownStatus)}</p>
            </div>

            <div class="detail-box">
              <h3>Artifact / note</h3>
              <p>${escapeHtml(selected.artifact || selected.sourceConfidenceNote || "No artifact listed.")}</p>
            </div>
          </div>
          ${renderTicketPanel(selected)}
        </section>
      `;

      document.getElementById("projectSelect").addEventListener("change", (event) => {
        const nextProject = projects.find(p => p.id === event.target.value);
        renderDetailView(nextProject);
      });
    }


    function normalizeSortValue(value) {
      return String(value ?? "").toLowerCase().trim();
    }

    function versionSortValue(value) {
      const text = normalizeSortValue(value);
      const match = text.match(/v?(\d+)(?:\.(\d+))?(?:\.(\d+))?/);
      if (!match) return text;
      const major = String(match[1] || "0").padStart(4, "0");
      const minor = String(match[2] || "0").padStart(4, "0");
      const patch = String(match[3] || "0").padStart(4, "0");
      return `${major}.${minor}.${patch}.${text}`;
    }

    function trackerSortValue(project, key) {
      const statusRank = { active: 1, blocked: 2, decision: 3, parked: 4, historical: 5 };
      const confidenceRank = { high: 1, medium: 2, low: 3, historical: 4 };

      if (key === "name") return normalizeSortValue(project.name);
      if (key === "latestVersion") return versionSortValue(project.latestVersion);
      if (key === "status") return statusRank[project.status] ?? 99;
      if (key === "stage") return normalizeSortValue(project.stage || "");
      if (key === "shipReadiness") return Number(project.shipReadiness || 0);
      if (key === "productConfidence") return Number(project.shipReadiness || 0);
      if (key === "sourceCertainty") return confidenceRank[project.sourceCertainty || project.sourceConfidence || project.confidence] ?? 99;
      if (key === "nextAction") return normalizeSortValue(project.nextAction);
      if (key === "blocker") return normalizeSortValue(project.blocker || project.decisionNeeded || "");
      if (key === "formats") return normalizeSortValue(formatFormats(project));
      if (key === "confidence") return confidenceRank[project.confidence] ?? 99;
      return normalizeSortValue(project.name);
    }

    function compareTrackerProjects(a, b) {
      const av = trackerSortValue(a, trackerSortKey);
      const bv = trackerSortValue(b, trackerSortKey);
      let result = 0;

      if (typeof av === "number" && typeof bv === "number") {
        result = av - bv;
      } else {
        result = String(av).localeCompare(String(bv), undefined, { numeric: true, sensitivity: "base" });
      }

      if (result === 0) {
        result = a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: "base" });
      }

      return trackerSortDir === "asc" ? result : -result;
    }

    function sortIndicator(key) {
      if (trackerSortKey !== key) return "↕";
      return trackerSortDir === "asc" ? "↑" : "↓";
    }

    function ariaSortValue(key) {
      if (trackerSortKey !== key) return "none";
      return trackerSortDir === "asc" ? "ascending" : "descending";
    }

    function sortableHeader(label, key) {
      return `
        <th aria-sort="${ariaSortValue(key)}">
          <button class="sort-button" data-action="sort-tracker" data-sort-key="${escapeHtml(key)}">
            <span>${escapeHtml(label)}</span>
            <span class="sort-indicator" aria-hidden="true">${escapeHtml(sortIndicator(key))}</span>
          </button>
        </th>
      `;
    }

    function renderTrackerView() {
      const visible = projects.filter(p => {
        const q = trackerSearch.trim().toLowerCase();
        const matchesSearch = !q || JSON.stringify(p).toLowerCase().includes(q);
        const matchesStatus = trackerStatus === "all" || p.status === trackerStatus;
        return matchesSearch && matchesStatus;
      }).sort(compareTrackerProjects);

      document.getElementById("trackerView").innerHTML = `
        <section class="section">
          <h2 class="section-title">Full tracker — reference only</h2>
          <div class="tracker-controls">
            <input class="search" id="trackerSearch" type="search" placeholder="Search tracker…" value="${escapeHtml(trackerSearch)}" />
            <select class="select" id="statusFilter" aria-label="Filter by status">
              ${["all", "active", "blocked", "decision", "parked", "historical"].map(v => `<option value="${v}" ${trackerStatus === v ? "selected" : ""}>${v === "all" ? "All statuses" : statusLabel(v)}</option>`).join("")}
            </select>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  ${sortableHeader("Project", "name")}
                  ${sortableHeader("Version", "latestVersion")}
                  ${sortableHeader("Status", "status")}
                  ${sortableHeader("Stage", "stage")}
                  ${sortableHeader("Ship Readiness", "shipReadiness")}
                  ${sortableHeader("Next", "nextAction")}
                  ${sortableHeader("Blocker", "blocker")}
                  ${sortableHeader("Formats", "formats")}
                </tr>
              </thead>
              <tbody>
                ${visible.map(p => `
                  <tr data-action="open-detail" data-project-id="${escapeHtml(p.id)}">
                    <td>${escapeHtml(p.name)}</td>
                    <td>${escapeHtml(p.latestVersion)}</td>
                    <td>${badge(p.status)}</td>
                    <td>${escapeHtml(p.stage || "Unclassified")}</td>
                    <td>${readinessBar(p)}</td>
                    <td>${escapeHtml(p.nextAction)}</td>
                    <td>${escapeHtml(p.blocker || p.decisionNeeded || "")}</td>
                    <td>${escapeHtml(formatFormats(p))}</td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        </section>
      `;

      document.getElementById("trackerSearch").addEventListener("input", (event) => {
        trackerSearch = event.target.value;
        renderTrackerView();
      });

      document.getElementById("statusFilter").addEventListener("change", (event) => {
        trackerStatus = event.target.value;
        renderTrackerView();
      });

      document.querySelectorAll("[data-action='sort-tracker']").forEach(button => {
        button.addEventListener("click", (event) => {
          event.stopPropagation();
          const key = button.dataset.sortKey;
          if (trackerSortKey === key) {
            trackerSortDir = trackerSortDir === "asc" ? "desc" : "asc";
          } else {
            trackerSortKey = key;
            trackerSortDir = key === "shipReadiness" ? "desc" : "asc";
          }
          renderTrackerView();
        });
      });

    }

    function renderRitualView() {
      document.getElementById("ritualView").innerHTML = `
        <section class="section">
          <h2 class="section-title">Daily rhythm</h2>
          <div class="ritual-grid">
            <div class="ritual-box">
              <h3>Morning prompt</h3>
              <pre>Based on the THETA master tracker, what are we doing today?

Give me:
1. Top 3 priorities
2. Blocked items
3. Decisions needed
4. What not to touch today
5. First action for each priority</pre>
            </div>

            <div class="ritual-box">
              <h3>End-of-day active delta</h3>
              <pre>Give me an end-of-day active-delta update for the master tracker.
Only report this project if we touched it today:

Project:
Latest confirmed version:
Build/source artifact:
Formats in scope now:
What changed today:
What is working:
What is broken or uncertain:
Current blocker:
Next build/version:
Tomorrow's first action:
Any master-index updates needed:</pre>
            </div>
          </div>

          <p class="footer-note">Rule: only touched projects need end-of-day updates. The dashboard should never make you read all projects to decide what to do next.</p>
        </section>
      `;
    }

    function setActiveView(viewId) {
      viewIds.forEach(id => {
        document.getElementById(id).hidden = id !== viewId;
      });

      document.querySelectorAll(".tab").forEach(button => {
        button.classList.toggle("is-active", button.dataset.view === viewId);
      });

      if (viewId === "todayView") renderTodayView();
      if (viewId === "activeView") renderActiveView();
      if (viewId === "detailView") renderDetailView();
      if (viewId === "trackerView") renderTrackerView();
      if (viewId === "ritualView") renderRitualView();
    }

    function openProjectDetail(projectId) {
      selectedProjectId = projectId;
      setActiveView("detailView");
    }

    function updateClock() {
      const d = new Date();
      document.getElementById("clock").innerHTML = `
        <div>${d.toLocaleDateString(undefined, { weekday: "long", month: "long", day: "numeric", year: "numeric" })}</div>
        <div>${d.toLocaleTimeString(undefined, { hour: "2-digit", minute: "2-digit" })}</div>
      `;
    }

    function attachGlobalEvents() {
      document.querySelectorAll(".tab").forEach(button => {
        button.addEventListener("click", () => setActiveView(button.dataset.view));
      });

      document.body.addEventListener("click", (event) => {
        const target = event.target.closest("[data-action]");
        if (!target) return;
        const action = target.dataset.action;
        if (action === "open-detail") {
          openProjectDetail(target.dataset.projectId);
          return;
        }
        if (action === "ticket-save") {
          saveTicket(target);
          return;
        }
        if (action === "ticket-complete") {
          saveTicket(target, "passed");
          return;
        }
        if (action === "ticket-toggle") {
          const status = target.checked ? "passed" : "open";
          const card = target.closest(".ticket-card");
          const select = card?.querySelector('[data-ticket-field="status"]');
          if (select) select.value = status;
          saveTicket(target, status);
          return;
        }
        if (action === "return-packet") {
          generateReturnPacket(target.dataset.projectId);
          return;
        }
      });
    }

    async function loadData() {
      try {
        const response = await fetch("./data/projects.json", { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        dashboardData = await response.json();
      } catch (error) {
        dashboardData = fallbackData;
        document.getElementById("todayView").innerHTML = `
          <div class="load-error">
            <strong>Dashboard data could not load.</strong><br />
            Check that <code>data/projects.json</code> exists in the repo and was deployed with index.html.
          </div>
        `;
        console.error(error);
        return;
      }

      projects = dashboardData.projects || [];
      selectedProjectId = getTodayProjects()[0]?.id || projects[0]?.id || null;

      renderTodayView();
      renderActiveView();
      renderDetailView();
      renderTrackerView();
      renderRitualView();
      setActiveView("todayView");
    }

    attachGlobalEvents();
    updateClock();
    setInterval(updateClock, 1000 * 30);
    loadData();
  </script>
</body>
</html>
